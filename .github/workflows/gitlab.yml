name: Auto Firmware Dumper (GitLab Upload)

on:
  workflow_dispatch:
    inputs:
      USER_NAME:
        description: 'Name of your GitHub Account'
        required: true
        default: 'isus203'
      USER_EMAIL:
        description: 'E-mail of your GitHub Account'
        required: true
        default: ''
      FIRMWARE_URL:
        description: 'Stock ROM Link / Google Drive'
        required: true
        default: ''
      VENDOR_NAME:
        description: 'Device manufacturer (Fallback)'
        required: true
        default: ''
      CODE_NAME:
        description: 'Code name (Fallback)'
        required: true
        default: ''
      GENERATE_VENDOR:
        description: 'Create Vendor Tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_LINEAGE_DT:
        description: 'Upload LineageOS tree'
        required: true
        default: 'false'
        type: boolean
      UPLOAD_TWRP_DT:
        description: 'Upload TWRP tree'
        required: true
        default: 'false'
        type: boolean

jobs:
  dump:
    name: Auto Firmware Dumper
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GTOKEN }}
      TWT: ${{ github.event.inputs.UPLOAD_TWRP_DT }}
      LOT: ${{ github.event.inputs.UPLOAD_LINEAGE_DT }}
      GVT: ${{ github.event.inputs.GENERATE_VENDOR }}
      FUR: ${{ github.event.inputs.FIRMWARE_URL }}
      VENDOR: ${{ github.event.inputs.VENDOR_NAME }}
      CODE: ${{ github.event.inputs.CODE_NAME }}
      UN: ${{ github.event.inputs.USER_NAME }}
      UEM: ${{ github.event.inputs.USER_EMAIL }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: rokibhasansagar/slimhub_actions@main
    - uses: sersoft-gmbh/setup-gh-cli-action@v2
      with:
        version: stable
          
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Clone and Setup DumprX
      run: |
        git clone https://github.com/DumprX/DumprX
        cd DumprX
        sudo chmod +x *.sh
        bash setup.sh
        pip3 install aospdtgen twrpdtgen
      
    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
    - name: Update Packages
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install cpio aria2 git python3 neofetch tar gzip p7zip-full python3-pip lz4 erofs-utils f2fs-tools libvixl-dev m4 checkpolicy git-lfs
        pip install gdown

    - name: Setup GithubCLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
        
    - name: Authorize Git And GitHub CLI
      run: |
        git config --global user.name "${{ env.UN }}"
        git config --global user.email "${{ env.UEM }}"

        # Оптимизация сети
        git config --global http.postBuffer 6221225472
        git config --global core.compression 1
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        
        # Настройка лимитов памяти для упаковки объектов
        git config --global pack.windowMemory "512m"
        git config --global pack.packSizeLimit "512m"
        git config --global pack.threads "1"

        # Принудительно устанавливаем URL с токеном
        git remote set-url origin https://x-access-token:${{ secrets.GTOKEN }}@github.com/${{ github.repository }}.git

        git gc --prune=now --aggressive
        unset GITHUB_TOKEN
        
        gh auth login --with-token <<< "${{ secrets.GTOKEN }}"
      working-directory: ${{ github.workspace }}
  
    - name: Install firmware 
      run: |
        cd DumprX
        gdown "${{ env.FUR }}" -O firmware.zip
      working-directory: ${{ github.workspace }}
        
    - name: Create Dump
      run: |
        cd DumprX
        bash dumper.sh ./firmware.zip
        sudo chown -R $USER:$USER out
        sudo chmod -R 755 out
      working-directory: ${{ github.workspace }}

    - name: Extract Device Info
      run: |
        sudo chown -R $USER:$USER DumprX/out/
        cd DumprX/out
        
        # Ищем build.prop рекурсивно по всем важным разделам
        ALL_PROPS=$(find . -name "build*.prop")

        # 1. Извлекаем BRAND
        brand=$(grep -m1 -oP "(?<=^ro.product.brand=).*" -hs $ALL_PROPS | head -1)
        [[ -z "$brand" ]] && brand=$(grep -m1 -oP "(?<=^ro.product.manufacturer=).*" -hs $ALL_PROPS | head -1)
        
        # 2. Извлекаем CODENAME
        codename=$(grep -m1 -oP "(?<=^ro.product.model=).*" -hs $ALL_PROPS | head -1)
        [[ -z "$codename" ]] && codename=$(grep -m1 -oP "(?<=^ro.product.device=).*" -hs $ALL_PROPS | head -1)

        # 3. Извлекаем VERSION
        version=$(grep -m1 -oP "(?<=^ro.build.version.release=).*" -hs $ALL_PROPS | head -1)
        [[ -z "$version" ]] && version=$(grep -m1 -oP "(?<=^ro.build.version.release_or_codename=).*" -hs $ALL_PROPS | head -1)

        # Дополнительно вытягиваем BRANCH для структуры репозитория как в gitlab-dumprx
        branch=$(grep -m1 -oP "(?<=^ro.vendor.build.id=).*" -hs $ALL_PROPS | head -1)
        [[ -z "$branch" ]] && branch=$(grep -m1 -oP "(?<=^ro.build.id=).*" -hs $ALL_PROPS | head -1)

        # Очистка имен
        brand=$(echo "$brand" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]_')
        codename=$(echo "$codename" | tr -d '[:space:]' | tr '-' '_')
        branch=$(echo "$branch" | tr -d '[:space:]' | tr '-' '_')
        
        [[ -z "$brand" ]] && brand="${{ github.event.inputs.VENDOR_NAME }}"
        [[ -z "$codename" ]] && codename="${{ github.event.inputs.CODE_NAME }}"
        [[ -z "$branch" ]] && branch="main"
        
        echo "========================================"
        echo "BRAND       : $brand"
        echo "CODENAME    : $codename"
        echo "VERSION     : $version"
        echo "BRANCH      : $branch"
        echo "========================================"

        echo "$codename" > ${{ github.workspace }}/codename.txt
        echo "$brand" > ${{ github.workspace }}/brand.txt
        echo "$version" > ${{ github.workspace }}/version.txt
        echo "$branch" > ${{ github.workspace }}/branch.txt
        
        # Заносим переменные в GITHUB_ENV для совместимости с логикой шагов GitLab
        echo "MANUFACTURER_NAME=$brand" >> $GITHUB_ENV
        echo "VENDOR_NAME=$codename" >> $GITHUB_ENV
        echo "BRANCH=$branch" >> $GITHUB_ENV

    - name: Collect SELinux Files & Decompile
      run: |
        mkdir -p DumprX/out/selinux/system
        mkdir -p DumprX/out/selinux/vendor
        mkdir -p DumprX/out/selinux/product
        mkdir -p DumprX/out/selinux/system_ext
        mkdir -p DumprX/out/selinux/odm
        
        mkdir -p DumprX/out/selinux/decompiled_system
        mkdir -p DumprX/out/selinux/decompiled_vendor
        mkdir -p DumprX/out/selinux/decompiled_product
        mkdir -p DumprX/out/selinux/decompiled_system_ext
        mkdir -p DumprX/out/selinux/decompiled_odm
        
        rm -rf sepolicy_work && mkdir -p sepolicy_work
        
        echo "=== Копирование папок SELinux и build.prop ==="
        
        copy_selinux_dir() {
          local src_dir="$1"
          local dest_name="$2"
          
          if [ -d "$src_dir" ]; then
            echo "Найдена папка для $dest_name -> $src_dir"
            cp -r "$src_dir"/* DumprX/out/selinux/$dest_name/ 2>/dev/null || true
            
            mkdir -p "sepolicy_work/${dest_name}/etc/selinux"
            cp -r "$src_dir"/* "sepolicy_work/${dest_name}/etc/selinux/" 2>/dev/null || true
            
            local partition_root=$(echo "$src_dir" | sed 's|/etc/selinux||')
            if [ -f "${partition_root}/build.prop" ]; then
              mkdir -p "sepolicy_work/${dest_name}"
              cp "${partition_root}/build.prop" "sepolicy_work/${dest_name}/build.prop"
              mkdir -p "sepolicy_work/${dest_name}/${dest_name}"
              cp "${partition_root}/build.prop" "sepolicy_work/${dest_name}/${dest_name}/build.prop" 2>/dev/null || true
            elif [ -f "DumprX/out/${dest_name}/build.prop" ]; then
              mkdir -p "sepolicy_work/${dest_name}"
              cp "DumprX/out/${dest_name}/build.prop" "sepolicy_work/${dest_name}/build.prop"
            fi
          fi
        }

        copy_selinux_dir "DumprX/out/system/etc/selinux" "system"
        copy_selinux_dir "DumprX/out/system/system/etc/selinux" "system"
        copy_selinux_dir "DumprX/out/vendor/etc/selinux" "vendor"
        copy_selinux_dir "DumprX/out/product/etc/selinux" "product"
        copy_selinux_dir "DumprX/out/system_ext/etc/selinux" "system_ext"
        copy_selinux_dir "DumprX/out/odm/etc/selinux" "odm"

        copy_selinux_dir "DumprX/out/vendor/odm/etc/selinux" "odm"

        cd sepolicy_work
        if [ -d "system/etc/selinux" ]; then
          mkdir -p system/system/etc
          cp -r system/etc/selinux system/system/etc/ 2>/dev/null || true
          if [ -f "system/build.prop" ]; then
            cp "system/build.prop" "system/system/build.prop" 2>/dev/null || true
          fi
        fi
        
        cd ..

        rm -rf SELinux-CIL-Decompiler
        git clone --depth 1 https://github.com/isus203/SELinux-CIL-Decompiler.git SELinux-CIL-Decompiler

        if [ -f "SELinux-CIL-Decompiler/decompile_cil.py" ]; then
          cd SELinux-CIL-Decompiler/system/sepolicy/api/
          if [ ! -d "202404" ]; then
            if [ -d "34.0" ]; then
              cp -r "34.0" "202404"
            elif [ -d "202504" ]; then
              cp -r "202504" "202404"
            fi
          fi
          cd ../../../..

          cd SELinux-CIL-Decompiler
          for part in system vendor product system_ext odm; do
            target_path="${GITHUB_WORKSPACE}/sepolicy_work/${part}/etc/selinux"
            if [ -d "$target_path" ]; then
              python3 decompile_cil.py -s "$target_path" -o "${GITHUB_WORKSPACE}/DumprX/out/selinux/decompiled_${part}" || true
              if [ -z "$(ls -A ${GITHUB_WORKSPACE}/DumprX/out/selinux/decompiled_${part} 2>/dev/null)" ]; then
                rm -rf "${GITHUB_WORKSPACE}/DumprX/out/selinux/decompiled_${part}"
              fi
            fi
          done
          cd ..
        fi
        rm -rf sepolicy_work
        
        # === Очистка исходных папок SELinux перед пушем ===
        # Удаляем только оригиналы (system, vendor, product, system_ext, odm) внутри папки selinux,
        # папки decompiled_* затронуты не будут.
        echo "=== Удаление оригинальных папок SELinux ==="
        for part in system vendor product system_ext odm; do
          if [ -d "DumprX/out/selinux/${part}" ]; then
            echo "Удаление оригинальной папки SELinux: ${part}"
            rm -rf "DumprX/out/selinux/${part}"
          fi
        done

    - name: Create Gitlab Repository
      run: |
        curl --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" -X POST "https://gitlab.com/api/v4/projects?name=android_dump_${{ env.MANUFACTURER_NAME }}_${{ env.VENDOR_NAME }}&visibility=public" > repo.json
        echo "USERNAME=$(cat repo.json | grep -o '"username":"[^"]*' | cut -d'"' -f4)" >> $GITHUB_ENV
        cat repo.json

    - name: Push Dump to GitLab via SSH
      env:
        SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
      run: |
        # Настройка SSH-агента
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
        
        cd DumprX/out
        sudo rm -rf .git .gitignore .gitattributes
        
        git init
        git lfs install
        find . \( -name "*sensetime*" -o -name "*.lic" \) | cut -d'/' -f'2-' >| .gitignore
        git branch -M ${{ env.BRANCH }}
        
        # Меняем URL на SSH-формат
        git remote add origin git@gitlab.com:${{ env.USERNAME }}/android_dump_${{ env.MANUFACTURER_NAME }}_${{ env.VENDOR_NAME }}.git
        
        find . -type f -size +100M -exec git lfs track {} \;
        if [ -f .gitattributes ]; then
            git add .gitattributes
            git commit -s -m "Setup Git LFS"
            git push -u origin ${{ env.BRANCH }}
        fi
        
        # Пушим стандартным циклом
        DUMP_DIR_LIST=$(find -type d -not -empty -printf "%P\n" | grep -v / | grep -v .git)
        for dir in ${DUMP_DIR_LIST}; do
            git add ${dir}
            git commit -s -m "dump: ${dir}: import dump"
            git push -u origin ${{ env.BRANCH }}
        done
        
        git add .
        git commit -s -m "dump: remaining files"
        git push -u origin ${{ env.BRANCH }}

    # Логика сборки Vendor Tree и Device Tree (если флаги активны) работает локально в workspace
    - name: Create vendor tree
      if: env.GVT == 'true'
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        mkdir -p ${{ github.workspace }}/vnd_project/dump
        mkdir -p ${{ github.workspace }}/vnd_project/android/device/"$brand"/"$codename"
        
        # Копируем созданный дамп обратно для утилиты экстрактора
        cp -r DumprX/out/* ${{ github.workspace }}/vnd_project/dump/ 2>/dev/null || true
        
        cd ${{ github.workspace }}/vnd_project
        if [ -d android/device/"$brand"/"$codename" ]; then
           git clone --depth=1 https://github.com/LineageOS/android_tools_extract-utils -b lineage-22.1 ./android/tools/extract-utils
           git clone --depth=1 https://github.com/LineageOS/android_prebuilts_extract-tools -b lineage-22.1 ./android/prebuilts/extract-tools
           
           sudo chmod 777 android/device/"$brand"/"$codename"/*.sh
           cd android/device/"$brand"/"$codename"
           bash extract-files.sh ${{ github.workspace }}/vnd_project/dump/
        else
           echo "LINEAGEOS DEVICE TREE NOT FOUND!"
           exit 1
        fi
        
    - name: Uploading Vendor Tree
      if: env.GVT == 'true'
      env:
        GH_TOKEN: ${{ secrets.GTOKEN }}
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        
        cd ${{ github.workspace }}/vnd_project/android/vendor/"$brand"/"$codename"
        git init
        git branch -M vendor-"$codename"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename: initial vendor tree"
        gh repo create android_vendor_"$brand"_"$codename" --public --description="Vendor tree for $codename" --source=. --remote=origin --push
        echo "🌳 **Vendor Tree:** [android_vendor_${brand}_${codename}](https://github.com/${{ github.repository_owner }}/android_vendor_${brand}_${codename})" >> $GITHUB_STEP_SUMMARY

    - name: Uploading LineageOS Device Tree
      if: env.LOT == 'true'
      env:
        GH_TOKEN: ${{ secrets.GTOKEN }}
      run: |
        codename=$(cat ${{ github.workspace }}/codename.txt)
        brand=$(cat ${{ github.workspace }}/brand.txt)
        cd ${{ github.workspace }}/vnd_project/android/device/"$brand"/"$codename"
        git init
        git branch -M lineage-"$codename"-$(date +%Y%m%d)
        git add .
        git commit -s -m "$codename: LineageOS device tree"
        gh repo create lineage_device_"$brand"_"$codename" --public --description="LineageOS tree for $codename" --source=. --remote=origin --push
      continue-on-error: true

    - name: Uploading preview of images
      uses: actions/upload-artifact@v4
      with: 
        name: Preview images
        path: |
          /home/Auto-Firmware-Dumper/boot.img
          /home/Auto-Firmware-Dumper/recovery.img
          /home/Auto-Firmware-Dumper/vendor_boot.img
          /home/Auto-Firmware-Dumper/init_boot.img
          /home/Auto-Firmware-Dumper/dtbo.img
          /home/Auto-Firmware-Dumper/dtb.img
        if-no-files-found: ignore
      continue-on-error: true
      
